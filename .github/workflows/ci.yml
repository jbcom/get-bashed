name: CI
on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6.0.1
      - name: CI setup (get-bashed)
        run: ./scripts/ci-setup.sh "bats,shellcheck,actionlint,bashate,pre_commit"
      - name: Run tests
        run: bats tests
      - name: Pre-commit
        run: ./scripts/pre-commit-ci.sh
