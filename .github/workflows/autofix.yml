name: PR Autofix
on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  autofix:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6.0.1
        with:
          fetch-depth: 0
      - name: CI setup (get-bashed)
        run: ./scripts/ci-setup.sh "pre_commit,shdoc,actionlint,shellcheck,bashate"
      - name: Run pre-commit
        run: pre-commit run --all-files || true
      - name: Detect changes
        id: changed
        uses: tj-actions/changed-files@8cba46e29c11878d930bca7870bb54394d3e8b21  # v47.0.2
      - name: Commit fixes
        if: steps.changed.outputs.any_modified == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: apply pre-commit fixes [skip actions]" || exit 0
          git push
